name: Appliquer le footer légal STOOM

on:
  workflow_dispatch:
  push:
    paths:
      - 'apply-stoom-legal-footer.py'
      - 'assets/site-shell.js'
      - 'assets/age-check.js'
      - 'assets/legal-pages.css'
      - 'mentions-legales.html'
      - 'politique-confidentialite.html'
      - 'politique-cookies.html'
      - 'reglement-concours.html'
      - '.github/workflows/apply-stoom-legal-footer.yml'

permissions:
  contents: write

jobs:
  patch-existing-pages:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Mettre à jour les pages existantes
        run: python3 apply-stoom-legal-footer.py

      - name: Enregistrer les modifications
        run: |
          if git diff --quiet; then
            echo "Aucune page supplémentaire à modifier."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "feat: add legal footer and consent controls"
          git push
