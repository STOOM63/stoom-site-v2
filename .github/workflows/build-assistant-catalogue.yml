{
"name": "Mettre à jour le catalogue Assistant STOOM",
"on": {
"workflow_dispatch": {},
"push": {
"branches": ["main"],
"paths": [
"/*.html",
"data//*.json",
"scripts/build-assistant-catalogue.mjs",
".github/workflows/build-assistant-catalogue.yml"
]
}
},
"permissions": {
"contents": "write"
},
"jobs": {
"generer-catalogue": {
"runs-on": "ubuntu-latest",
"steps": [
{
"name": "Récupérer le dépôt",
"uses": "actions/checkout@v4"
},
{
"name": "Installer Node",
"uses": "actions/setup-node@v4",
"with": {
"node-version": 22
}
},
{
"name": "Générer le catalogue complet",
"run": "node scripts/build-assistant-catalogue.mjs"
},
{
"name": "Enregistrer le catalogue mis à jour",
"run": "git config user.name github-actions-bot && git config user.email actions@github.com && git add data/assistant/catalogue-produits.json && if git diff --cached --quiet; then echo no-change; else git commit -m catalogue-update && git push; fi"
}
]
}
}
}
